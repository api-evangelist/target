provider: target
providerId: target
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Retail
  - Ecommerce
  - Rate Limiting
description: Target Corporation does not publish public rate-limit documentation. Limits applied
  to vendor, marketplace, or media-program integrations are governed by the partner agreement
  and the relevant program's onboarding documentation.
sources:
  - https://corporate.target.com/
notes: No public rate-limit documentation. Each partner program (vendor portal, Target+, Roundel,
  Shipt) governs its own throttling under partner onboarding documentation.
responseCodes:
  throttled: 429
limits:
  - name: Program-defined limits
    scope: account
    metric: varies
    limit: see partner program documentation
policies:
  - name: Program-Level Governance
    description: Each Target partner program manages its own rate-limit and concurrency policy
      through partner onboarding rather than a public developer page.
