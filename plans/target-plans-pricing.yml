specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: target
providerId: target
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Retail
  - Ecommerce
description: Target Corporation does not publish a public developer API pricing page. Programmatic
  access (vendor portal, Roundel media, Target+ marketplace, Target Plus partner integrations,
  Shipt) is gated behind partnership and vendor onboarding rather than a self-serve plan tier.
sources:
  - https://corporate.target.com/
notes: No public Target developer pricing surface. Partner programs (Target+, Roundel, Shipt)
  publish onboarding flows but not list pricing. Plans collapsed to a single Contact Sales entry.
plans:
  - id: target-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-negotiated partner or vendor engagement with Target. Pricing and access
      depend on the program (vendor, Target+, Roundel, Shipt) and are determined through the
      relevant partnership team.
    entries:
      - label: Custom Engagement
        name: custom_engagement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom Scoping
      - name: Vendor / Partner Onboarding
      - name: Program-Specific Terms
maintainers:
