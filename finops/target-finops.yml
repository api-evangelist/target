meters:
  - name: custom_engagement
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility is delivered through program-specific partner portals (vendor portal,
      Target+, Roundel) rather than a unified public usage API.
  - name: Allocation
    description: Allocation is handled in the partner's own AP system against the program's invoice
      line items.
  - name: Optimization
    description: Optimization is addressed in commercial review with the program team (assortment,
      media spend, marketplace fees).
  - name: Accountability
    description: Accountability sits with the partner team that owns the relevant Target program
      relationship.
