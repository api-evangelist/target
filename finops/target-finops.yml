description: FinOps placeholder for Target Corporation. No public developer billing surface;
  partner-program billing is governed by program-specific terms (vendor / Target+ / Roundel /
  Shipt) and falls under the partner's own AP reconciliation against Target invoices.
sources:
  - https://corporate.target.com/
notes: No public billing telemetry for partner / developer programs. Meter list collapsed to
  custom engagement pending program-specific confirmation.
billingModel:
  pricingCategory: Custom / Contact Sales
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
