naftiko: 1.0.0-alpha2
info:
  label: Target API — Products
  description: 'Target API — Products. 2 operations. Lead operation: List Products. Self-contained Naftiko capability covering
    one Target business surface.'
  tags:
  - Target
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TARGET_API_KEY: TARGET_API_KEY
capability:
  consumes:
  - type: http
    namespace: target-products
    baseUri: https://api.target.com
    description: Target API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products-v3
      path: /products/v3
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tcins
          in: query
          type: string
          description: Comma-separated list of TCINs
        - name: category
          in: query
          type: string
          description: Category ID to filter products
        - name: brand
          in: query
          type: string
          description: Brand name to filter products
        - name: limit
          in: query
          type: integer
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          description: Offset for pagination
    - name: products-v3-tcin
      path: /products/v3/{tcin}
      operations:
      - name: getproduct
        method: GET
        description: Get Product Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tcin
          in: path
          type: string
          description: Target Corporation Item Number (TCIN)
          required: true
        - name: store_id
          in: query
          type: string
          description: Store ID for localized pricing and availability
        - name: zip
          in: query
          type: string
          description: ZIP code for localized pricing
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to return
    authentication:
      type: bearer
      token: '{{env.TARGET_API_KEY}}'
  exposes:
  - type: rest
    namespace: target-products-rest
    port: 8080
    description: REST adapter for Target API — Products. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/products/v3
      name: products-v3
      description: REST surface for products-v3.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: target-products.listproducts
        with:
          tcins: rest.tcins
          category: rest.category
          brand: rest.brand
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/v3/{tcin}
      name: products-v3-tcin
      description: REST surface for products-v3-tcin.
      operations:
      - method: GET
        name: getproduct
        description: Get Product Details
        call: target-products.getproduct
        with:
          tcin: rest.tcin
          store_id: rest.store_id
          zip: rest.zip
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: target-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Target API — Products. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: target-products.listproducts
      with:
        tcins: tools.tcins
        category: tools.category
        brand: tools.brand
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-details
      description: Get Product Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: target-products.getproduct
      with:
        tcin: tools.tcin
        store_id: tools.store_id
        zip: tools.zip
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
