openapi: 3.1.0
info:
  title: Target API
  description: >-
    Target provides partner APIs for product catalog access, inventory availability, order management, and store information. These APIs enable technology partners and affiliates to integrate with Target's retail platform.
  version: '1.0'
  contact:
    name: Target Developer Support
    url: https://developer.target.com/
externalDocs:
  description: Documentation
  url: https://developer.target.com/
servers:
  - url: https://api.target.com
    description: Production
tags:
  - name: Retail
    description: Retail operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Retail
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
